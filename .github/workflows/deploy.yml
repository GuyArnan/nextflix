name: Deploy to EC2

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened] # Staging
  push:
    branches: [main] # Production
  workflow_run:
    workflows: ["CI Build & Push to ECR"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        if: github.event_name == 'pull_request'
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_STAGING_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker login -u AWS -p $(aws ecr get-login-password --region ${{ secrets.AWS_REGION }}) ${{ secrets.ECR_REPOSITORY }}
            docker pull ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            docker stop nextflix || true
            docker rm nextflix || true
            docker run -d --name nextflix -p 3000:3000 ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to Production
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_PROD_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker login -u AWS -p $(aws ecr get-login-password --region ${{ secrets.AWS_REGION }}) ${{ secrets.ECR_REPOSITORY }}
            docker pull ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            docker stop nextflix || true
            docker rm nextflix || true
            docker run -d --name nextflix -p 3000:3000 ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
